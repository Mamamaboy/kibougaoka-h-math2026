<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卍絶望ケ丘卍　大学入試数学　過去問道場</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div id="app-container">
        
        <div id="screen-home" class="screen">
            <h1>卍絶望ケ丘卍<br><span style="font-size: 0.6em;">大学入試数学 過去問道場</span></h1>
            <div class="button-group">
                <button class="btn-huge" onclick="switchScreen('screen-practice-settings')">演習を始める</button>
                <button class="btn-huge btn-search-mode" onclick="switchScreen('screen-search')">問題検索</button>
            </div>
        </div>

        <div id="screen-practice-settings" class="screen hidden">
            <h2>演習条件の設定</h2>
            <form id="practice-form">
                <div class="form-group">
                    <label>難易度 (複数選択可):</label>
                    <div class="checkbox-group" id="difficulty-group">
                        <label><input type="checkbox" name="difficulty" value="all"> すべて</label>
                        <label><input type="checkbox" name="difficulty" value="1"> ★1</label>
                        <label><input type="checkbox" name="difficulty" value="2"> ★2</label>
                        <label><input type="checkbox" name="difficulty" value="3"> ★3</label>
                        <label><input type="checkbox" name="difficulty" value="4"> ★4</label>
                        <label><input type="checkbox" name="difficulty" value="5"> ★5</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>カテゴリ (複数選択可):</label>
                    <div class="checkbox-group" id="category-group">
                        <label><input type="checkbox" name="category" value="all"> すべて</label>
                        <label><input type="checkbox" name="category" value="数学Ⅰ"> 数学Ⅰ</label>
                        <label><input type="checkbox" name="category" value="数学Ⅱ"> 数学Ⅱ</label>
                        <label><input type="checkbox" name="category" value="数学Ⅲ"> 数学Ⅲ</label>
                        <label><input type="checkbox" name="category" value="数学A"> 数学A</label>
                        <label><input type="checkbox" name="category" value="数学B"> 数学B</label>
                        <label><input type="checkbox" name="category" value="数学C"> 数学C</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>問題数:</label>
                    <select id="question-count" name="count">
                        <option value="">選択してください</option>
                        <option value="1">1問</option>
                        <option value="2">2問</option>
                        <option value="3">3問</option>
                        <option value="4">4問</option>
                        <option value="5">5問</option>
                    </select>
                </div>
            </form>
            
            <button id="btn-start-practice" disabled onclick="startPractice()">演習開始</button>
            <button class="btn-secondary" onclick="switchScreen('screen-home')">戻る</button>
        </div>

        <div id="screen-practice-questions" class="screen hidden">
            <h2>演習中</h2>
            <div id="practice-container"></div>
            <button class="btn-secondary" onclick="switchScreen('screen-home')">演習を終了する</button>
        </div>

        <div id="screen-search" class="screen hidden">
            <button class="btn-secondary" onclick="switchScreen('screen-home')" style="margin-bottom: 20px;">トップに戻る</button>
            
            <h2>問題検索</h2>
            <div class="search-filters form-group">
                <label>難易度 (複数選択可):</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="search-difficulty" value="all"> すべて</label>
                    <label><input type="checkbox" name="search-difficulty" value="1"> ★1</label>
                    <label><input type="checkbox" name="search-difficulty" value="2"> ★2</label>
                    <label><input type="checkbox" name="search-difficulty" value="3"> ★3</label>
                    <label><input type="checkbox" name="search-difficulty" value="4"> ★4</label>
                    <label><input type="checkbox" name="search-difficulty" value="5"> ★5</label>
                </div>
                
                <label style="margin-top: 15px;">カテゴリ (複数選択可):</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="search-category" value="all"> すべて</label>
                    <label><input type="checkbox" name="search-category" value="数学Ⅰ"> 数学Ⅰ</label>
                    <label><input type="checkbox" name="search-category" value="数学Ⅱ"> 数学Ⅱ</label>
                    <label><input type="checkbox" name="search-category" value="数学Ⅲ"> 数学Ⅲ</label>
                    <label><input type="checkbox" name="search-category" value="数学A"> 数学A</label>
                    <label><input type="checkbox" name="search-category" value="数学B"> 数学B</label>
                    <label><input type="checkbox" name="search-category" value="数学C"> 数学C</label>
                </div>
                <button class="btn-primary" onclick="executeSearch()" style="margin-top: 20px;">検索</button>
            </div>
            
            <div id="search-results-container"></div>
            
            <button id="btn-back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">▲ 上部へ</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
