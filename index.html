<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学 受験対策アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <div id="screen-home" class="screen">
            <h1>数学 受験対策アプリ</h1>
            <div class="button-group">
                <button onclick="switchScreen('screen-practice-settings')">演習モード</button>
                <button onclick="switchScreen('screen-search')">問題検索</button>
            </div>
        </div>

        <div id="screen-practice-settings" class="screen hidden">
            <h2>演習条件の設定</h2>
            <form id="practice-form">
                <div class="form-group">
                    <label>難易度 (1つ選択):</label>
                    <div class="radio-group" id="difficulty-group">
                        <label><input type="radio" name="difficulty" value="1"> ★1</label>
                        <label><input type="radio" name="difficulty" value="2"> ★2</label>
                        <label><input type="radio" name="difficulty" value="3"> ★3</label>
                        <label><input type="radio" name="difficulty" value="4"> ★4</label>
                        <label><input type="radio" name="difficulty" value="5"> ★5</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>カテゴリ (複数選択可):</label>
                    <div class="checkbox-group" id="category-group">
                        <label><input type="checkbox" name="category" value="数学Ⅰ"> 数学Ⅰ</label>
                        <label><input type="checkbox" name="category" value="数学Ⅱ"> 数学Ⅱ</label>
                        <label><input type="checkbox" name="category" value="数学Ⅲ"> 数学Ⅲ</label>
                        <label><input type="checkbox" name="category" value="数学A"> 数学A</label>
                        <label><input type="checkbox" name="category" value="数学B"> 数学B</label>
                        <label><input type="checkbox" name="category" value="数学C"> 数学C</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>問題数:</label>
                    <select id="question-count" name="count">
                        <option value="">選択してください</option>
                        <option value="1">1問</option>
                        <option value="2">2問</option>
                        <option value="3">3問</option>
                        <option value="4">4問</option>
                        <option value="5">5問</option>
                    </select>
                </div>
            </form>
            
            <button id="btn-start-practice" disabled onclick="startPractice()">演習開始</button>
            <button class="btn-secondary" onclick="switchScreen('screen-home')">戻る</button>
        </div>

        <div id="screen-practice-questions" class="screen hidden">
            <h2>演習中</h2>
            <div id="practice-container"></div>
            <button onclick="switchScreen('screen-home')">演習を終了する</button>
        </div>

        <div id="screen-search" class="screen hidden">
            <h2>問題検索</h2>
            <div class="search-filters">
                <select id="search-difficulty">
                    <option value="">すべての難易度</option>
                    <option value="1">★1</option>
                    <option value="2">★2</option>
                    <option value="3">★3</option>
                    <option value="4">★4</option>
                    <option value="5">★5</option>
                </select>
                <select id="search-category">
                    <option value="">すべてのカテゴリ</option>
                    <option value="数学Ⅰ">数学Ⅰ</option>
                    <option value="数学Ⅱ">数学Ⅱ</option>
                    <option value="数学Ⅲ">数学Ⅲ</option>
                    <option value="数学A">数学A</option>
                    <option value="数学B">数学B</option>
                    <option value="数学C">数学C</option>
                </select>
                <button onclick="executeSearch()">検索</button>
            </div>
            <div id="search-results-container"></div>
            <button class="btn-secondary" onclick="switchScreen('screen-home')">戻る</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
